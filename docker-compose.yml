services:
  justicepourtous:
    build: .
    container_name: justicepourtous
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - default
      - batiscan-network

networks:
  batiscan-network:
    external: true
    name: batiscan-v4_batiscan-network
