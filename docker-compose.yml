services:
  justicepourtous:
    build: .
    container_name: justicepourtous
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - batiscan-network

networks:
  batiscan-network:
    external: true
    name: batiscan-v4_batiscan-network
