<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VosDroits — Consultation</title>
  <meta name="description" content="Consultation juridique gratuite et anonyme. Repondez a 5 questions pour connaitre vos droits.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x2696;</text></svg>">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <nav class="nav">
      <a href="/" class="nav-brand">
        <span class="logo-mark"></span>
        VosDroits
      </a>
      <ul class="nav-links">
        <li><a href="/">Accueil</a></li>
        <li><a href="/annuaire.html">Annuaire</a></li>
      </ul>
    </nav>

    <div class="dossier-ref" id="dossierRef"></div>

    <div class="progress-container">
      <div class="progress-label">
        <span id="progressText">Question 1</span>
        <span id="progressCount">0%</span>
      </div>
      <div class="progress-bar"><div class="fill" id="progress" style="width:0%"></div></div>
    </div>

    <div class="question-card" id="questionCard">
      <h2 id="questionText">Chargement...</h2>
      <div class="options" id="options"></div>
      <div class="nav-buttons">
        <button class="btn btn-outline" id="prevBtn" onclick="prevQuestion()" disabled>Precedent</button>
        <button class="btn" id="nextBtn" onclick="nextQuestion()" disabled>Suivant</button>
      </div>
    </div>

    <div class="error-box hidden" id="errorBox">
      Une erreur est survenue. <a href="/">Retour a l'accueil</a>
    </div>

    <div class="disclaimer">
      VosDroits fournit des informations juridiques generales basees sur le droit suisse en vigueur. Il ne remplace pas un conseil d'avocat personnalise.
    </div>

    <footer>&copy; 2026 VosDroits</footer>
  </div>

  <script src="/app.js"></script>
  <script>
    // Generate dossier ref
    var year = new Date().getFullYear();
    var num = String(Math.floor(Math.random() * 9000) + 1000);
    document.getElementById('dossierRef').textContent = 'Ref. JB-' + year + '-' + num;

    var params = new URLSearchParams(window.location.search);
    var domaine = params.get('domaine');
    if (domaine) {
      initConsultation(domaine);
    } else {
      window.location.href = '/';
    }
  </script>
</body>
</html>
