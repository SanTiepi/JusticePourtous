<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#FAF9F7"/>

  <!-- Accent mark (nav-mark style) -->
  <rect x="80" y="200" width="48" height="48" rx="6" fill="#8B2500"/>

  <!-- Brand name -->
  <text x="148" y="240" font-family="'Playfair Display', Georgia, serif" font-size="48" font-weight="700" fill="#1B1B1B">JusticePourtous</text>

  <!-- Tagline -->
  <text x="148" y="290" font-family="Inter, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#4A4A4A">Le droit suisse, accessible a tous</text>

  <!-- Decorative line -->
  <rect x="148" y="320" width="120" height="3" rx="1.5" fill="#8B2500" opacity="0.6"/>

  <!-- URL -->
  <text x="80" y="560" font-family="Inter, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#7A7A7A">justicepourtous.ch</text>

  <!-- Subtle top accent bar -->
